<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="description" content="Battle Destroyer — The ultimate stress testing platform. Precision attacks, credits system, real-time monitoring." />
    <title>BATTLE-DESTROYER — Attack Platform</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        background: #0a0a12;
        color: #f1f5f9;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }

      /* Global scrollbar */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #0a0a12; }
      ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #ef4444; }

      /* Selection */
      ::selection { background: rgba(220, 38, 38, 0.35); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
